# Терминал с полной terminfo-записью (пакет ncurses-term) — без него
# сложные TUI (claude-code, lazygit) внутри tmux «разъезжаются».
set -g default-terminal "tmux-256color"

# Truecolor (24-bit) для внешнего терминала любого типа.
set -ga terminal-overrides ",*:Tc"
set -as terminal-features ",*:RGB"

set -g mouse on
