name: Build SEA

# Переиспользуемая сборка бинарников (SEA) под все платформы.
# Вызывается из release.yml и nightly.yml через `workflow_call`,
# а также может быть запущена вручную через `workflow_dispatch`.
on:
  workflow_call:
    inputs:
      version:
        description: "Версия, зашиваемая в бинарник (релиз: vX.Y.Z; ночная: nightly-<hash>)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Версия, зашиваемая в бинарник (релиз: vX.Y.Z; ночная: nightly-<hash>)"
        required: false
        type: string

jobs:
  build:
    strategy:
      matrix:
        # mode: чем упаковываем.
        #   sea         — Node SEA (`node --build-sea`).
        #   selfextract — sh-стаб + приклеенный payload (нетронутый node + main.js +
        #                 vexx.bundle). Обязателен на Intel macOS, где инъекция
        #                 SEA-блоба портит Mach-O chained fixups → segfault до main()
        #                 (#143, #144); на linux-x64 просто лучше — бинарь втрое
        #                 меньше. Windows остаётся на SEA: стаб — POSIX sh.
        include:
          - os: ubuntu-latest
            asset: vexx-linux-x64
            binary: dist/vexx
            mode: selfextract
          - os: macos-latest
            asset: vexx-macos-arm64
            binary: dist/vexx
            mode: sea
          - os: macos-15-intel
            asset: vexx-macos-x64
            binary: dist/vexx
            mode: selfextract
          - os: windows-latest
            asset: vexx-windows-x64.exe
            binary: dist/vexx.exe
            mode: sea

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Версия сборочного node. Для mode: selfextract держи в лок-степе с
      # NODE_VERSION в scripts/build-selfextract.mjs — там node, который уезжает
      # в payload и становится рантаймом пользователя.
      - uses: actions/setup-node@v4
        with:
          node-version: "25"

      - run: npm install

      - run: npm run build:sea
        if: matrix.mode == 'sea'
        env:
          VEXX_VERSION: ${{ inputs.version }}

      - run: npm run build:selfextract
        if: matrix.mode == 'selfextract'
        env:
          VEXX_VERSION: ${{ inputs.version }}

      # Переименовываем в платформо-зависимое имя ассета, чтобы:
      #  - файлы не конфликтовали при заливке в один релиз;
      #  - URL на скачивание был стабильным (важно для nightly).
      - name: Rename binary
        shell: bash
        run: mv "${{ matrix.binary }}" "${{ matrix.asset }}"

      # Последний рубеж перед публикацией: ассет обязан реально стартовать на этом
      # железе. Именно этого не хватало в #143 — segfault-ящий vexx-macos-x64 уехал
      # в релиз, потому что никто ни разу не запустил собранный файл.
      # Самотесты внутри build-скриптов проверяют то же, но здесь проверяется
      # ровно тот файл, который уйдёт в upload-artifact, и уже после rename.
      - name: Smoke — asset actually starts
        shell: bash
        run: ./${{ matrix.asset }} --version

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error
