name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install

      - run: npm run test:coverage

      # Постим (или обновляем) комментарий с таблицей покрытия и непокрытыми
      # строками затронутых файлов. always() — чтобы отчёт появился и когда
      # покрытие упало ниже порога и предыдущий шаг сделал job красным
      # (reportOnFailure в vitest.config.ts гарантирует, что отчёт всё равно
      # сгенерирован).
      - name: Report coverage
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2

  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: 
          - ubuntu-latest
          # - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      # node-pty собирается из исходников, если для текущей версии Node нет prebuild.
      # На ubuntu нужен build-essential + python3 (на macOS они уже есть из Xcode CLT,
      # на Windows setup-node + windows-build-tools обычно достаточно).
      - name: Install build deps for node-pty (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential python3

      - run: npm install

      # Последовательный прогон в CI (как было до параллелизации): детерминизм
      # на общих раннерах важнее скорости — несколько SEA/PTY-процессов на слабой
      # машине дают тайминг-флейк. Параллель доступна локально (VEXX_E2E_WORKERS).
      - run: npm run test:e2e
        env:
          VEXX_E2E_WORKERS: '1'
