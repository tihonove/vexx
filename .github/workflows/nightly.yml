name: Nightly

# Ночная сборка по принципу "плавающего тега" (как в yazi):
# тег `nightly` всегда указывает на свежий коммит, поэтому URL на
# скачивание артефактов остаётся неизменным.
on:
  schedule:
    # Каждую ночь в 03:00 UTC.
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Вычисляем short-hash заранее, чтобы зашить его в бинарник через build.yml.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
      - id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  # Та же переиспользуемая сборка, что и у стабильного релиза.
  build:
    needs: prepare
    uses: ./.github/workflows/build.yml
    with:
      version: nightly-${{ needs.prepare.outputs.short_sha }}

  nightly:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          short_sha="${{ needs.prepare.outputs.short_sha }}"

          # Удаляем предыдущий nightly-релиз вместе с его тегом.
          # `|| true` — на случай самого первого запуска, когда релиза ещё нет.
          gh release delete nightly --cleanup-tag --yes || true

          # Настраиваем git, чтобы можно было создать аннотированный тег.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Создаём аннотированный тег. В отличие от легковесного тега (который
          # gh создаёт сам и датирует датой коммита), у аннотированного тега
          # дата — это момент его создания, т.е. время запуска workflow.
          # Благодаря этому nightly-релиз всегда оказывается наверху списка,
          # даже если новых коммитов не было.
          git tag -fa nightly -m "Nightly build tag"
          git push origin refs/tags/nightly --force

          # Создаём prerelease. Без `--target` — gh подхватит уже отправленный
          # аннотированный тег `nightly` с актуальной датой.
          gh release create nightly \
            --prerelease \
            --title "Nightly ($short_sha)" \
            --notes "Ночная сборка из коммита $short_sha ($(date -u +'%Y-%m-%d %H:%M') UTC)." \
            artifacts/*
