name: PR Build

# Сборка бинарников (SEA) для каждого pull request, чтобы их можно было
# скачать и протестировать до мёрджа. Бинарники доступны как артефакты
# на странице запуска; ссылку на них публикует job `comment` прямо в PR.
on:
  pull_request:
    branches: [main]

# Новый пуш в ту же ветку отменяет предыдущую (ещё не завершённую) сборку —
# экономит CI-минуты, когда коммиты идут пачкой.
concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # Та же переиспользуемая сборка, что и у стабильного релиза и nightly.
  build:
    uses: ./.github/workflows/build.yml

  # Публикуем (или обновляем) комментарий со ссылкой на артефакты PR.
  comment:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Upsert artifacts comment
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- pr-build-artifacts -->';
            const body = [
              marker,
              '🛠️ **Бинарники этого PR собраны**',
              '',
              `Скачать: [артефакты запуска #${context.runId}](${runUrl}#artifacts)`,
              `(коммит \`${context.payload.pull_request.head.sha.slice(0, 7)}\`)`,
              '',
              '| Платформа | Артефакт |',
              '| --- | --- |',
              '| Linux x64 | `vexx-linux-x64` |',
              '| macOS arm64 | `vexx-macos-arm64` |',
              '| Windows x64 | `vexx-windows-x64.exe` |',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
