name: Release

# Стабильный (версионный) релиз: триггерится пушем тега вида v1.2.3.
# Тег обычно создаётся через bump-version.yml.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Собираем бинарники переиспользуемым воркфлоу.
  build:
    uses: ./.github/workflows/build.yml
    with:
      # Зашиваем версию из тега (vX.Y.Z) — build.yml срежет ведущую `v`.
      version: ${{ github.ref_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # git-cliff нужна полная история, чтобы построить changelog.
          fetch-depth: 0

      - name: Generate Changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          # Группировка и фильтрация коммитов настроены в cliff.toml (корень репо):
          # в changelog попадают только пользовательские изменения редактора.
          config: cliff.toml
          args: --latest --strip all

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Vexx ${{ github.ref_name }}
          body: ${{ steps.cliff.outputs.content }}
          files: artifacts/*
